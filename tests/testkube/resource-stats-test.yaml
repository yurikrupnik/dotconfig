# Testkube Test for Resource Stats Collection
# This test can be triggered via Testkube CLI, API, or CI/CD pipelines
# Documentation: https://docs.testkube.io/
apiVersion: tests.testkube.io/v3
kind: Test
metadata:
  name: resource-stats-collect
  namespace: testkube
  labels:
    app: resource-stats
    type: metrics-collection
spec:
  type: container-executor
  executionRequest:
    image: ghcr.io/yurikrupnik/resource-stats-operator:latest
    command:
      - /resource-stats-operator
    args:
      - collect
      - --format=json
      - --save-to-crd=testkube-metrics
      - --namespace=monitoring
    # Service account with permissions to access cluster metrics and CRDs
    jobTemplate: |
      apiVersion: batch/v1
      kind: Job
      spec:
        template:
          spec:
            serviceAccountName: resource-stats-operator
            containers:
              - name: "{{ .Name }}"
                image: "{{ .Image }}"
                command: {{ .Command | toJson }}
                args: {{ .Args | toJson }}
---
# TestTrigger for automated execution on events
apiVersion: tests.testkube.io/v1
kind: TestTrigger
metadata:
  name: resource-stats-on-deployment
  namespace: testkube
spec:
  # Trigger on any deployment change
  resource: deployment
  resourceSelector:
    namespace: default
  event: modified
  action: run
  execution: test
  testSelector:
    name: resource-stats-collect
    namespace: testkube
  concurrencyPolicy: forbid
---
# TestTrigger for scheduled execution (alternative to CronJob)
apiVersion: tests.testkube.io/v1
kind: TestTrigger
metadata:
  name: resource-stats-scheduled
  namespace: testkube
spec:
  resource: event
  event: cronjob
  # Schedule using cron expression
  cronJobTemplate: "*/10 * * * *"
  action: run
  execution: test
  testSelector:
    name: resource-stats-collect
    namespace: testkube
  concurrencyPolicy: forbid
---
# TestSuite for comprehensive metrics collection
apiVersion: tests.testkube.io/v3
kind: TestSuite
metadata:
  name: cluster-health-check
  namespace: testkube
  labels:
    app: cluster-health
spec:
  description: "Comprehensive cluster health and metrics collection"
  steps:
    - stopOnFailure: false
      execute:
        - test: resource-stats-collect
    # Add more tests as needed
---
# Webhook executor for external triggers
apiVersion: executor.testkube.io/v1
kind: Webhook
metadata:
  name: resource-stats-webhook
  namespace: testkube
spec:
  uri: http://resource-stats-operator.monitoring:8080/api/v1/collect
  events:
    - start-test
    - end-test-success
    - end-test-failed
  payloadObjectField: ""
  payloadTemplate: |
    {
      "save_to_crd": "testkube-{{ .TestExecution.Name }}",
      "namespace": "monitoring"
    }
