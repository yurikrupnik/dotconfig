# Operator test pod and RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: operator-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operator-node-reader
subjects:
  - kind: ServiceAccount
    name: operator-sa
    namespace: dotconfig-test
roleRef:
  kind: ClusterRole
  name: operator-node-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: operator-test
  labels:
    app: operator
    test: "true"
spec:
  serviceAccountName: operator-sa
  containers:
    - name: operator
      image: ghcr.io/yurikrupnik/operator:latest
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          memory: "128Mi"
          cpu: "100m"
        requests:
          memory: "64Mi"
          cpu: "50m"
  restartPolicy: Never
