# Scaling Tests
# Tests horizontal scaling of the dotconfig deployment

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: deployment-scaling
spec:
  description: Test deployment scaling capabilities
  timeouts:
    apply: 60s
    assert: 180s

  steps:
    # Step 1: Deploy with 1 replica
    - name: initial-deployment
      description: Deploy with single replica
      try:
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: dotconfig-scale-test
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: dotconfig-scale
                template:
                  metadata:
                    labels:
                      app: dotconfig-scale
                  spec:
                    containers:
                      - name: dotconfig
                        image: ghcr.io/yurikrupnik/dotconfig:latest
                        imagePullPolicy: IfNotPresent
                        ports:
                          - containerPort: 8080
                        resources:
                          limits:
                            memory: "128Mi"
                            cpu: "100m"
                          requests:
                            memory: "64Mi"
                            cpu: "50m"
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: dotconfig-scale-test
            check:
              status.readyReplicas: 1

    # Step 2: Scale up to 3 replicas
    - name: scale-up
      description: Scale deployment to 3 replicas
      try:
        - patch:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: dotconfig-scale-test
            patch:
              spec:
                replicas: 3
        - assert:
            timeout: 120s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: dotconfig-scale-test
            check:
              status.readyReplicas: 3
              status.availableReplicas: 3

    # Step 3: Verify all pods are running
    - name: verify-all-pods
      description: All 3 pods should be running
      try:
        - script:
            content: |
              count=$(kubectl get pods -l app=dotconfig-scale --field-selector=status.phase=Running -o name | wc -l)
              echo "Running pods: $count"
              [ "$count" -eq 3 ]
            check:
              ($error): null

    # Step 4: Scale down to 1 replica
    - name: scale-down
      description: Scale deployment back to 1 replica
      try:
        - patch:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: dotconfig-scale-test
            patch:
              spec:
                replicas: 1
        - assert:
            timeout: 120s
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: dotconfig-scale-test
            check:
              status.readyReplicas: 1

    # Step 5: Test zero-downtime during scaling
    - name: zero-downtime-scale
      description: Scaling should not cause service interruption
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: dotconfig-scale-test
              spec:
                selector:
                  app: dotconfig-scale
                ports:
                  - port: 8080
                    targetPort: 8080
        # Start background traffic
        - script:
            background: true
            timeout: 60s
            content: |
              for i in $(seq 1 30); do
                kubectl run curl-$i --image=curlimages/curl --rm -i --restart=Never -- \
                  curl -s http://dotconfig-scale-test:8080/health || true
                sleep 1
              done
        # Scale during traffic
        - patch:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: dotconfig-scale-test
            patch:
              spec:
                replicas: 2

  catch:
    - describe:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: dotconfig-scale-test
    - podLogs:
        selector: app=dotconfig-scale
        tail: 20
