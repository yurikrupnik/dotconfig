server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: containers
  static_configs:
  - targets:
      - localhost
    labels:
      job: containerlogs
      __path__: /var/log/containers/*.log

  pipeline_stages:
  - json:
      expressions:
        output: log
        stream: stream
        time: time

  - json:
      expressions:
        tag:
      source: output

  - regex:
      expression: (?P<stream_name>stderr|stdout)
      source: stream

  - labels:
      stream:
      tag:
      stream_name:

  - output:
      source: output
