[functions.up]
description = "Refresh installed packages on this machine"
commands = [
    "brew update",
    "just -f $DOTCONFIG_DIR/justfile brew-install",
    "brew upgrade",
    "brew cleanup",
    "rustup update",
    "just -f $DOTCONFIG_DIR/justfile cargo-install",
    "just -f $DOTCONFIG_DIR/justfile node-install",
    "bun update --global --latest",
    "gcloud components update --quiet",
    "just -f $DOTCONFIG_DIR/justfile regen"
]

[functions.csort]
description = "Format and sort cargo workspace"
commands = [
    "cargo fmt",
    "cargo sort --workspace"
]

# Note: `mcp`, `nx-run`, and `upkg` are no longer declared here. They live at
# config/scripts/{mcp,nx-run,upkg}.nu and are installed directly to ~/.local/bin/
# by the generator.

[environment]
EDITOR = "zed"
KUBE_EDITOR = "zed"
BROWSER = "open"
AI = "claude"

PROJECT = "rust"
TYPE = "be" # fe, devops, data, cli, operator, ci - tekton

# Locale / XDG (consolidated from hand-written zshrc + env.nu)
LANG = "en_US.UTF-8"
XDG_CONFIG_HOME = "$HOME/.config"

# Homebrew behavior: `up` handles updates and cleanup explicitly, so suppress
# brew's implicit auto-update and post-install cleanup for predictable runs.
# HOMEBREW_BUNDLE_FILE lets bare `brew bundle` work from any directory.
HOMEBREW_NO_AUTO_UPDATE = "1"
HOMEBREW_NO_INSTALL_CLEANUP = "1"
HOMEBREW_BUNDLE_FILE = "$DOTCONFIG_DIR/config/brew/Brewfile"
