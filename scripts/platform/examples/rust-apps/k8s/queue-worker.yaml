# Queue Worker Kubernetes Deployment with KEDA
apiVersion: v1
kind: ServiceAccount
metadata:
  name: queue-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  labels:
    app: queue-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      serviceAccountName: queue-worker
      containers:
        - name: queue-worker
          image: ghcr.io/yurikrupnik/queue-worker:latest
          ports:
            - containerPort: 8080
              name: health
          env:
            - name: REDIS_URL
              value: "redis://redis.default.svc.cluster.local:6379"
            - name: QUEUE_NAME
              value: "tasks"
            - name: CONCURRENCY
              value: "10"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: queue-worker
spec:
  selector:
    app: queue-worker
  ports:
    - port: 8080
      targetPort: 8080
      name: health
---
# KEDA ScaledObject
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: queue-worker-scaler
  labels:
    app: queue-worker
spec:
  scaleTargetRef:
    name: queue-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 20
  idleReplicaCount: 1
  triggers:
    - type: redis
      metadata:
        address: redis.default.svc.cluster.local:6379
        listName: tasks
        listLength: "5"
        activationListLength: "1"
