# Dapr Service Kubernetes Deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dapr-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dapr-service
  labels:
    app: dapr-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dapr-service
  template:
    metadata:
      labels:
        app: dapr-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "dapr-service"
        dapr.io/app-port: "3000"
        dapr.io/enable-api-logging: "true"
    spec:
      serviceAccountName: dapr-service
      containers:
        - name: dapr-service
          image: ghcr.io/yurikrupnik/dapr-service:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: DAPR_HTTP_PORT
              value: "3500"
            - name: STATE_STORE
              value: "statestore"
            - name: PUBSUB_NAME
              value: "pubsub"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dapr-service
spec:
  selector:
    app: dapr-service
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
# HPA for Dapr Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dapr-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dapr-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
