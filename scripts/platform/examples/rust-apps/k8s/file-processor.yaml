# File Processor Kubernetes Deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: file-processor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-processor
  labels:
    app: file-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: file-processor
  template:
    metadata:
      labels:
        app: file-processor
    spec:
      serviceAccountName: file-processor
      containers:
        - name: file-processor
          image: ghcr.io/yurikrupnik/file-processor:latest
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: PORT
              value: "3002"
            - name: WORKERS
              value: "0"
            - name: MAX_FILE_SIZE_MB
              value: "100"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: file-processor
spec:
  selector:
    app: file-processor
  ports:
    - port: 80
      targetPort: 3002
      name: http
---
# KEDA ScaledObject for CPU-intensive workloads
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: file-processor-scaler
  labels:
    app: file-processor
spec:
  scaleTargetRef:
    name: file-processor
  pollingInterval: 15
  cooldownPeriod: 180
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    # Scale based on CPU utilization
    - type: cpu
      metricType: Utilization
      metadata:
        value: "60"
    # Scale based on memory utilization
    - type: memory
      metricType: Utilization
      metadata:
        value: "70"
    # Scale based on task queue
    - type: redis
      metadata:
        address: redis.default.svc.cluster.local:6379
        listName: file-processing-tasks
        listLength: "3"
