version: "3.8"

services:
  # Infrastructure
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Queue Worker (KEDA-scalable)
  queue-worker:
    build:
      context: .
      target: queue-worker
    environment:
      - REDIS_URL=redis://redis:6379
      - QUEUE_NAME=tasks
      - CONCURRENCY=10
      - RUST_LOG=info
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  # Dapr Service
  dapr-service:
    build:
      context: .
      target: dapr-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DAPR_HTTP_PORT=3500
      - STATE_STORE=statestore
      - PUBSUB_NAME=pubsub
      - RUST_LOG=info
    depends_on:
      redis:
        condition: service_healthy

  # Dapr sidecar for dapr-service
  dapr-service-dapr:
    image: daprio/daprd:1.12.0
    command:
      - "./daprd"
      - "-app-id=dapr-service"
      - "-app-port=3000"
      - "-placement-host-address=placement:50006"
      - "-components-path=/components"
    volumes:
      - ./components:/components
    network_mode: "service:dapr-service"
    depends_on:
      - dapr-service
      - placement

  # Dapr placement service
  placement:
    image: daprio/placement:1.12.0
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"

  # LLM Agent
  llm-agent:
    build:
      context: .
      target: llm-agent
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEFAULT_MODEL=anthropic/claude-3.5-sonnet
      - FALLBACK_MODEL=openai/gpt-4o
      - RUST_LOG=info

  # File Processor
  file-processor:
    build:
      context: .
      target: file-processor
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - WORKERS=0
      - RUST_LOG=info
    volumes:
      - ./:/workspace:ro

volumes:
  redis-data:
