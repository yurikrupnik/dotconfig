apiVersion: platform.example.com/v1alpha1
kind: WebApp
metadata:
  name: my-app
  namespace: default
spec:
  parameters:
    image: nginx
    port: 8080
    replicas: 1
    service:
      enabled: true
    ingress:
      enabled: false
    chaos:
      enabled: false
    gitops:
      enabled: false
    ha:
      enabled: false
    serviceAccount: default
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1"
  status:
    availableReplicas: 1
    url: "http://localhost:8080"