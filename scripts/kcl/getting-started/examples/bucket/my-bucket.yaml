# Simple Multi-cloud Bucket Example
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: Bucket
metadata:
  name: my-bucket
  namespace: default
spec:
  provider: gcp  # Options: gcp, aws, azure
  parameters:
    location: us-east1
    storageClass: STANDARD
    versioning: true
    publicAccessPrevention: true
    lifecycleRules:
      - id: archive-after-30-days
        enabled: true
        transition:
          days: 30
          storageClass: INFREQUENT_ACCESS
    tags:
      environment: dev
      managed-by: platform-operator
  providerConfigRef:
    name: default
