[functions.update]
description = "Update system packages"
commands = [
    "brew bundle --file ~/dotconfig/brew/Brewfile",
    "rustup update",
    "gcloud components update",
    "npm update -g",
    "nu ~/dotconfig/scripts/nu/setup-local-machine/shells.nu generate"
]


[functions.nx-run]
description = "Run Nx command on all projects"
commands = [
    "nu ~/dotconfig/scripts/nu/index.nu nx \"$@\""
]

[functions.mcp]
description = "Generate MCP server configuration file"
commands = [
    "nu ~/dotconfig/scripts/nu/setup-local-machine/mcp.nu \"$@\""
]

[environment]
EDITOR = "zed"
BROWSER = "open"

SHIT_TEXT = "omg"
SHIT = true
AI = "claude"

