# Taurus Load Testing Deployment
# BlazeMeter Taurus - automation-friendly testing framework
apiVersion: v1
kind: Namespace
metadata:
  name: taurus
  labels:
    app.kubernetes.io/part-of: taurus-stack
---
# ConfigMap with Taurus test scenarios
apiVersion: v1
kind: ConfigMap
metadata:
  name: taurus-tests
  namespace: taurus
data:
  # Basic load test configuration
  load-test.yaml: |
    execution:
      - concurrency: 10
        ramp-up: 1m
        hold-for: 5m
        scenario: api-test

    scenarios:
      api-test:
        default-address: http://tauri-backend.tauri:8080
        requests:
          - url: /health
            method: GET
            label: health-check
          - url: /api/status
            method: GET
            label: status-check

    reporting:
      - module: console
      - module: final-stats
        dump-xml: /artifacts/results.xml

  # Stress test configuration
  stress-test.yaml: |
    execution:
      - concurrency: 50
        ramp-up: 2m
        hold-for: 10m
        scenario: stress-scenario

    scenarios:
      stress-scenario:
        default-address: http://tauri-backend.tauri:8080
        requests:
          - url: /api/data
            method: POST
            headers:
              Content-Type: application/json
            body: '{"test": "data"}'
          - url: /api/query
            method: GET
            label: query-test

    reporting:
      - module: console
      - module: blazemeter
        test: Stress Test
      - module: final-stats
        dump-xml: /artifacts/stress-results.xml

  # Smoke test (quick validation)
  smoke-test.yaml: |
    execution:
      - concurrency: 1
        iterations: 10
        scenario: smoke

    scenarios:
      smoke:
        default-address: http://tauri-backend.tauri:8080
        requests:
          - url: /health
          - url: /ready

    reporting:
      - module: console
      - module: final-stats
        percentiles: true

  # Spike test configuration
  spike-test.yaml: |
    execution:
      - concurrency: 5
        hold-for: 1m
        scenario: spike-scenario
      - concurrency: 100
        ramp-up: 10s
        hold-for: 2m
        scenario: spike-scenario
      - concurrency: 5
        hold-for: 1m
        scenario: spike-scenario

    scenarios:
      spike-scenario:
        default-address: http://tauri-backend.tauri:8080
        requests:
          - url: /api/process
            method: POST

    reporting:
      - module: console
      - module: final-stats
---
# PVC for test artifacts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: taurus-artifacts-pvc
  namespace: taurus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# Job for running load tests
apiVersion: batch/v1
kind: Job
metadata:
  name: taurus-load-test
  namespace: taurus
  labels:
    app: taurus
    test-type: load
spec:
  ttlSecondsAfterFinished: 7200
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: taurus
        test-type: load
    spec:
      containers:
        - name: taurus
          image: blazemeter/taurus:latest
          imagePullPolicy: IfNotPresent
          command: ["bzt"]
          args:
            - "/tests/load-test.yaml"
            - "-o"
            - "settings.artifacts-dir=/artifacts"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: tests
              mountPath: /tests
              readOnly: true
            - name: artifacts
              mountPath: /artifacts
      restartPolicy: Never
      volumes:
        - name: tests
          configMap:
            name: taurus-tests
        - name: artifacts
          persistentVolumeClaim:
            claimName: taurus-artifacts-pvc
---
# CronJob for scheduled load tests
apiVersion: batch/v1
kind: CronJob
metadata:
  name: taurus-scheduled-load-test
  namespace: taurus
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: taurus
            test-type: scheduled
        spec:
          containers:
            - name: taurus
              image: blazemeter/taurus:latest
              command: ["bzt"]
              args:
                - "/tests/smoke-test.yaml"
                - "-o"
                - "settings.artifacts-dir=/artifacts/$(date +%Y%m%d-%H%M%S)"
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              volumeMounts:
                - name: tests
                  mountPath: /tests
                  readOnly: true
                - name: artifacts
                  mountPath: /artifacts
          restartPolicy: Never
          volumes:
            - name: tests
              configMap:
                name: taurus-tests
            - name: artifacts
              persistentVolumeClaim:
                claimName: taurus-artifacts-pvc
