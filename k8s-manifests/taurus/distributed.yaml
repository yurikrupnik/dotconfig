# Distributed Taurus Load Testing
# Scale out load generation across multiple pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taurus-worker
  namespace: taurus
  labels:
    app: taurus-worker
spec:
  replicas: 0  # Scaled by KEDA or manually
  selector:
    matchLabels:
      app: taurus-worker
  template:
    metadata:
      labels:
        app: taurus-worker
    spec:
      containers:
        - name: taurus
          image: blazemeter/taurus:latest
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]  # Keep alive for test execution
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TAURUS_WORKER
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: tests
              mountPath: /tests
              readOnly: true
            - name: artifacts
              mountPath: /artifacts
      volumes:
        - name: tests
          configMap:
            name: taurus-tests
        - name: artifacts
          emptyDir: {}
---
# Service for worker discovery
apiVersion: v1
kind: Service
metadata:
  name: taurus-workers
  namespace: taurus
spec:
  clusterIP: None  # Headless service
  selector:
    app: taurus-worker
  ports:
    - port: 8089
      name: worker
---
# Orchestrator job that coordinates distributed test
apiVersion: batch/v1
kind: Job
metadata:
  name: taurus-distributed-test
  namespace: taurus
  labels:
    app: taurus-orchestrator
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: taurus-orchestrator
    spec:
      serviceAccountName: taurus-orchestrator
      initContainers:
        # Scale up workers before test
        - name: scale-workers
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Scaling up taurus workers..."
              kubectl scale deployment taurus-worker -n taurus --replicas=5
              echo "Waiting for workers to be ready..."
              kubectl rollout status deployment/taurus-worker -n taurus --timeout=120s
      containers:
        - name: orchestrator
          image: blazemeter/taurus:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting distributed load test..."

              # Get worker pod IPs
              WORKERS=$(kubectl get pods -n taurus -l app=taurus-worker -o jsonpath='{.items[*].status.podIP}')

              # Run test with worker provisioning
              bzt /tests/load-test.yaml \
                -o execution.0.distributed="$WORKERS" \
                -o settings.artifacts-dir=/artifacts

              echo "Test complete, scaling down workers..."
          volumeMounts:
            - name: tests
              mountPath: /tests
              readOnly: true
            - name: artifacts
              mountPath: /artifacts
      # Scale down workers after test
      restartPolicy: Never
      volumes:
        - name: tests
          configMap:
            name: taurus-tests
        - name: artifacts
          persistentVolumeClaim:
            claimName: taurus-artifacts-pvc
---
# ServiceAccount and RBAC for orchestrator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: taurus-orchestrator
  namespace: taurus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taurus-orchestrator-role
  namespace: taurus
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: taurus-orchestrator-binding
  namespace: taurus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: taurus-orchestrator-role
subjects:
  - kind: ServiceAccount
    name: taurus-orchestrator
    namespace: taurus
---
# KEDA ScaledObject for auto-scaling workers based on queue
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: taurus-worker-scaler
  namespace: taurus
spec:
  scaleTargetRef:
    name: taurus-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 20
  triggers:
    # Scale based on pending test jobs
    - type: kubernetes-workload
      metadata:
        podSelector: 'app=taurus-orchestrator'
        value: '5'  # 5 workers per orchestrator
