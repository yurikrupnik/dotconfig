apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: stress-cpu
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  stressors:
    cpu:
      workers: 2
      load: 80
      options:
        - "--cpu 2"
        - "--timeout 600"
  duration: "30s"
  scheduler:
    cron: "@every 10m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: stress-memory
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  stressors:
    memory:
      workers: 2
      size: "256MB"
      oomScoreAdj: 1000
  duration: "30s"
  scheduler:
    cron: "@every 10m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: stress-disk
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  stressors:
    vm:
      workers: 1
      size: "256MB"
      options:
        - "--vm-bytes 256M"
        - "--vm-hang 1"
  duration: "20s"
  scheduler:
    cron: "@every 15m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: stress-all
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  stressors:
    cpu:
      workers: 2
      load: 60
    memory:
      workers: 2
      size: "128MB"
  duration: "45s"
  scheduler:
    cron: "@every 20m"
