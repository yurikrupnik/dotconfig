# Litmus Advanced Chaos Experiments
# Equivalent to advanced-chaos.yaml from Chaos Mesh

---
# Note: Litmus doesn't have KernelChaos or TimeChaos equivalents
# Providing alternatives and workarounds

# HTTP Chaos - Experiment 1: HTTP Abort (equivalent to http-fault)
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-http-reset-peer-chaos
  namespace: default
spec:
  annotationCheck: "false"
  engineState: "active"
  appinfo:
    appns: default
    applabel: "app=dotconfig"
    appkind: deployment
  chaosServiceAccount: pod-delete-sa
  experiments:
  - name: pod-http-reset-peer
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "20"
        - name: TARGET_SERVICE_PORT
          value: "8080"
        - name: RESET_TIMEOUT
          value: "0" # Immediate reset (abort)
        - name: TOXICITY
          value: "50" # 50% of requests affected
        - name: PODS_AFFECTED_PERC
          value: "100"
      probe: []
---
# CronJob for HTTP abort every 10 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: http-reset-chaos-cron
  namespace: default
spec:
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pod-delete-sa
          containers:
          - name: chaos-runner
            image: litmuschaos/chaos-runner:latest
            command:
            - sh
            - -c
            - |
              kubectl apply -f - <<EOF
              apiVersion: litmuschaos.io/v1alpha1
              kind: ChaosEngine
              metadata:
                name: http-reset-chaos-$(date +%s)
                namespace: default
              spec:
                annotationCheck: "false"
                engineState: "active"
                appinfo:
                  appns: default
                  applabel: "app=dotconfig"
                  appkind: deployment
                chaosServiceAccount: pod-delete-sa
                jobCleanUpPolicy: "delete"
                experiments:
                - name: pod-http-reset-peer
                  spec:
                    components:
                      env:
                      - name: TOTAL_CHAOS_DURATION
                        value: "20"
                      - name: TARGET_SERVICE_PORT
                        value: "8080"
                      - name: TOXICITY
                        value: "50"
              EOF
              sleep 30
          restartPolicy: OnFailure
---
# HTTP Chaos - Experiment 2: HTTP Latency (equivalent to http-delay)
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-http-latency-chaos
  namespace: default
spec:
  annotationCheck: "false"
  engineState: "active"
  appinfo:
    appns: default
    applabel: "app=dotconfig"
    appkind: deployment
  chaosServiceAccount: pod-delete-sa
  experiments:
  - name: pod-http-latency
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "30"
        - name: TARGET_SERVICE_PORT
          value: "8080"
        - name: LATENCY
          value: "500" # 500ms delay
        - name: TOXICITY
          value: "100" # Affect all requests
        - name: PODS_AFFECTED_PERC
          value: "100"
      probe: []
---
