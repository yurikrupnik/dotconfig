apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: dotconfig-pod-failure
  namespace: default
spec:
  action: pod-failure
  mode: one
  duration: "30s"
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  scheduler:
    cron: "@every 5m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: dotconfig-network-delay
  namespace: default
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  delay:
    latency: "200ms"
    jitter: "50ms"
    correlation: "25"
  direction: to
  target:
    selector:
      namespaces:
        - default
      labelSelectors:
        app: nats
    mode: one
---
apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: dotconfig-io-fault
  namespace: default
spec:
  action: disk-fill
  mode: one
  duration: "10s"
  configName: dotconfig-io-chaos
  pathSelector:
    paths:
      - "/var/log"
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
---
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: dotconfig-cpu-stress
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "30s"
  scheduler:
    cron: "@every 10m"
