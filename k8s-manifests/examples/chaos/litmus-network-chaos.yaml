  experiments:
  - name: pod-dns-error
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "60"
        - name: TARGET_HOSTNAMES
          value: "dotconfig-.*"
        - name: MATCH_SCHEME
          value: "regex"
      probe: []
