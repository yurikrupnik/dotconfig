# Litmus Network Chaos Experiments
# Equivalent to network-chaos.yaml from Chaos Mesh

---
# Experiment 1: Network Partition (equivalent to network-partition)
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-network-partition-chaos
  namespace: default
spec:
  annotationCheck: "false"
  engineState: "active"
  appinfo:
    appns: default
    applabel: "app=dotconfig"
    appkind: deployment
  chaosServiceAccount: pod-delete-sa
  experiments:
  - name: pod-network-partition
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "30"
        - name: NETWORK_INTERFACE
          value: "eth0"
        - name: DESTINATION_IPS
          value: "" # Will target pods with app=redis
        - name: DESTINATION_HOSTS
          value: "redis" # Service name
        - name: NETWORK_PACKET_LOSS_PERCENTAGE
          value: "100" # Complete partition
      probe: []
---
# CronJob for network partition every 5 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: network-partition-chaos-cron
  namespace: default
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pod-delete-sa
          containers:
          - name: chaos-runner
            image: litmuschaos/chaos-runner:latest
            command:
            - sh
            - -c
            - |
              kubectl apply -f - <<EOF
              apiVersion: litmuschaos.io/v1alpha1
              kind: ChaosEngine
              metadata:
                name: network-partition-chaos-$(date +%s)
                namespace: default
              spec:
                annotationCheck: "false"
                engineState: "active"
                appinfo:
                  appns: default
                  applabel: "app=dotconfig"
                  appkind: deployment
                chaosServiceAccount: pod-delete-sa
                jobCleanUpPolicy: "delete"
                experiments:
                - name: pod-network-partition
                  spec:
                    components:
                      env:
                      - name: TOTAL_CHAOS_DURATION
                        value: "30"
                      - name: DESTINATION_HOSTS
                        value: "redis"
              EOF
              sleep 40
          restartPolicy: OnFailure
---
