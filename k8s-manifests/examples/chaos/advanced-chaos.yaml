apiVersion: chaos-mesh.org/v1alpha1
kind: KernelChaos
metadata:
  name: kernel-failure
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  failKernRequest:
    callchain:
      - funcname: "*vfs_read*"
      - funcname: "*do_fileread*"
    failtype: 0
    headers:
      - "linux/mm.h"
    probability: 0.8
    times: 10
  duration: "10s"
  scheduler:
    cron: "@every 15m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: TimeChaos
metadata:
  name: time-shift
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  timeOffset: "-1h"
  containerNames:
    - dotconfig
  duration: "30s"
  scheduler:
    cron: "@every 20m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: http-fault
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  target: Request
  port: 8080
  path: /api
  method: GET
  abort: true
  percentage: 50
  duration: "20s"
  scheduler:
    cron: "@every 10m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: http-delay
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  target: Request
  port: 8080
  path: /api/v1
  method: GET
  delay: "500ms"
  duration: "30s"
  scheduler:
    cron: "@every 8m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  name: dns-failure
  namespace: default
spec:
  action: random
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: dotconfig
  duration: "1m"
  scheduler:
    cron: "@every 12m"
