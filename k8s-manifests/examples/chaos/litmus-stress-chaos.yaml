---
# Experiment 4: Combined CPU and Memory Stress (equivalent to stress-all)
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-cpu-memory-hog-chaos
  namespace: default
spec:
  annotationCheck: "false"
  engineState: "active"
  appinfo:
    appns: default
    applabel: "app=dotconfig"
    appkind: deployment
  chaosServiceAccount: pod-delete-sa
  experiments:
  # Note: Litmus doesn't support combined CPU+Memory in single experiment
  # Running them sequentially
  - name: pod-cpu-hog
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "22" # Split 45s into two experiments
        - name: CPU_CORES
          value: "2"
        - name: CPU_LOAD
          value: "60"
  - name: pod-memory-hog
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "23"
        - name: MEMORY_CONSUMPTION
          value: "128"
        - name: NUMBER_OF_WORKERS
          value: "2"
---
# CronJob for combined stress every 20 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
