---
# Experiment 3: Pod Memory Hog (VM stress - equivalent to stress-disk)
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-memory-hog-vm-chaos
  namespace: default
spec:
  annotationCheck: "false"
  engineState: "active"
  appinfo:
    appns: default
    applabel: "app=dotconfig"
    appkind: deployment
  chaosServiceAccount: pod-delete-sa
  experiments:
  - name: pod-memory-hog
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "20"
        - name: MEMORY_CONSUMPTION
          value: "256" # 256MB
        - name: NUMBER_OF_WORKERS
          value: "1"
        - name: PODS_AFFECTED_PERC
          value: "100"
        # Note: Litmus doesn't have exact equivalent for vm-hang
        # Using memory stress as closest alternative
      probe: []
---
