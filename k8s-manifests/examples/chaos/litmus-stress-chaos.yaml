  namespace: default
spec:
  schedule: "*/20 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pod-delete-sa
          containers:
          - name: chaos-runner
            image: litmuschaos/chaos-runner:latest
            command:
            - sh
            - -c
            - |
              kubectl apply -f - <<EOF
              apiVersion: litmuschaos.io/v1alpha1
              kind: ChaosEngine
              metadata:
                name: cpu-memory-hog-chaos-$(date +%s)
                namespace: default
              spec:
                annotationCheck: "false"
                engineState: "active"
                appinfo:
                  appns: default
                  applabel: "app=dotconfig"
                  appkind: deployment
                chaosServiceAccount: pod-delete-sa
                jobCleanUpPolicy: "delete"
                experiments:
                - name: pod-cpu-hog
                  spec:
                    components:
                      env:
                      - name: TOTAL_CHAOS_DURATION
                        value: "22"
                      - name: CPU_CORES
                        value: "2"
                      - name: CPU_LOAD
                        value: "60"
                - name: pod-memory-hog
                  spec:
                    components:
                      env:
                      - name: TOTAL_CHAOS_DURATION
                        value: "23"
                      - name: MEMORY_CONSUMPTION
                        value: "128"
                      - name: NUMBER_OF_WORKERS
                        value: "2"
              EOF
              sleep 55
          restartPolicy: OnFailure
