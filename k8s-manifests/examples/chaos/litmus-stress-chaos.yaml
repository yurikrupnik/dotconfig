# Litmus Stress Chaos Experiments
# Equivalent to stress-chaos.yaml from Chaos Mesh

---
# Experiment 1: Pod CPU Hog (equivalent to stress-cpu)
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-cpu-hog-chaos
  namespace: default
spec:
  annotationCheck: "false"
  engineState: "active"
  appinfo:
    appns: default
    applabel: "app=dotconfig"
    appkind: deployment
  chaosServiceAccount: pod-delete-sa
  experiments:
  - name: pod-cpu-hog
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: "30"
        - name: CPU_CORES
          value: "2"
        - name: CPU_LOAD
          value: "80"
        - name: PODS_AFFECTED_PERC
          value: "100"
        - name: TARGET_PODS
          value: ""
      probe: []
---
# CronJob for CPU stress every 10 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cpu-hog-chaos-cron
  namespace: default
spec:
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pod-delete-sa
          containers:
          - name: chaos-runner
            image: litmuschaos/chaos-runner:latest
            command:
            - sh
            - -c
            - |
              kubectl apply -f - <<EOF
              apiVersion: litmuschaos.io/v1alpha1
              kind: ChaosEngine
              metadata:
                name: cpu-hog-chaos-$(date +%s)
                namespace: default
              spec:
                annotationCheck: "false"
                engineState: "active"
                appinfo:
                  appns: default
                  applabel: "app=dotconfig"
                  appkind: deployment
                chaosServiceAccount: pod-delete-sa
                jobCleanUpPolicy: "delete"
                experiments:
                - name: pod-cpu-hog
                  spec:
                    components:
                      env:
                      - name: TOTAL_CHAOS_DURATION
                        value: "30"
                      - name: CPU_CORES
                        value: "2"
                      - name: CPU_LOAD
                        value: "80"
              EOF
              sleep 40
          restartPolicy: OnFailure
---
