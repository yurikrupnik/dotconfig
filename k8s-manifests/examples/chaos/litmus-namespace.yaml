# Litmus Chaos Namespace and RBAC Configuration
# This file sets up the complete namespace infrastructure for Litmus

---
# Litmus Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/component: operator
---
# Litmus Admin ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus-admin
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/part-of: litmus
---
# Litmus ClusterRole for Admin Operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litmus-admin
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/part-of: litmus
rules:
  # Litmus CRDs
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  
  # Pods and containers
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "pods/eviction"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch", "deletecollection"]
  
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "get", "list", "patch", "update"]
  
  # ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update"]
  
  # Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "delete", "get", "list", "update"]
  
  # Deployments and ReplicaSets
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  
  # Jobs and CronJobs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch", "deletecollection"]
  
  # Nodes (for node-level chaos)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
  
  # NetworkPolicies (for network chaos)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list", "patch", "update"]
  
  # PersistentVolumeClaims (for storage chaos)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  
  # Namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
# Litmus ClusterRoleBinding for Admin
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: litmus-admin
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/part-of: litmus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: litmus-admin
subjects:
  - kind: ServiceAccount
    name: litmus-admin
    namespace: litmus
---
# Default Chaos Namespace (for running chaos experiments)
apiVersion: v1
kind: Namespace
metadata:
  name: chaos-testing
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/part-of: litmus
    chaos-enabled: "true"
---
# ServiceAccount for Chaos Experiments in default namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus-chaos-runner
  namespace: default
  labels:
    app.kubernetes.io/part-of: litmus
---
# Role for Chaos Experiments in default namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litmus-chaos-runner
  namespace: default
  labels:
    app.kubernetes.io/part-of: litmus
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "pods/log", "pods/exec"]
    verbs: ["create", "list", "get", "patch", "update", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "list", "get", "delete", "deletecollection"]
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults"]
    verbs: ["create", "list", "get", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list"]
---
# RoleBinding for Chaos Experiments in default namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litmus-chaos-runner
  namespace: default
  labels:
    app.kubernetes.io/part-of: litmus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: litmus-chaos-runner
subjects:
  - kind: ServiceAccount
    name: litmus-chaos-runner
    namespace: default
---
# ServiceAccount for Chaos Experiments in chaos-testing namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus-chaos-runner
  namespace: chaos-testing
  labels:
    app.kubernetes.io/part-of: litmus
---
# Role for Chaos Experiments in chaos-testing namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litmus-chaos-runner
  namespace: chaos-testing
  labels:
    app.kubernetes.io/part-of: litmus
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "pods/log", "pods/exec"]
    verbs: ["create", "list", "get", "patch", "update", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "list", "get", "delete", "deletecollection"]
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults"]
    verbs: ["create", "list", "get", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list"]
---
# RoleBinding for Chaos Experiments in chaos-testing namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litmus-chaos-runner
  namespace: chaos-testing
  labels:
    app.kubernetes.io/part-of: litmus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: litmus-chaos-runner
subjects:
  - kind: ServiceAccount
    name: litmus-chaos-runner
    namespace: chaos-testing
---
# NetworkPolicy for Litmus namespace (optional security)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: litmus-network-policy
  namespace: litmus
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from same namespace
    - from:
      - namespaceSelector:
          matchLabels:
            app.kubernetes.io/name: litmus
    # Allow ingress for webhook and portal
    - from:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 8080
      - protocol: TCP
        port: 9091
      - protocol: TCP
        port: 3000
  egress:
    # Allow all egress (chaos experiments need to reach target namespaces)
    - to:
      - namespaceSelector: {}
    # Allow DNS
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
      ports:
      - protocol: UDP
        port: 53
---
# ResourceQuota for Litmus namespace (optional)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: litmus-quota
  namespace: litmus
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    persistentvolumeclaims: "5"
    pods: "50"
---
# LimitRange for Litmus namespace (optional)
apiVersion: v1
kind: LimitRange
metadata:
  name: litmus-limit-range
  namespace: litmus
spec:
  limits:
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "200m"
      memory: "256Mi"
    type: Container
---
# ConfigMap for Litmus Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: litmus-config
  namespace: litmus
  labels:
    app.kubernetes.io/part-of: litmus
data:
  # Chaos operator configuration
  CHAOS_RUNNER_IMAGE: "litmuschaos/chaos-runner:latest"
  CHAOS_OPERATOR_IMAGE: "litmuschaos/chaos-operator:latest"
  
  # Experiment image configuration
  EXPERIMENT_IMAGE: "litmuschaos/go-runner:latest"
  
  # Logging configuration
  LOG_LEVEL: "info"
  
  # Chaos experiment defaults
  DEFAULT_CHAOS_DURATION: "30"
  DEFAULT_CHAOS_INTERVAL: "10"
  DEFAULT_RAMP_TIME: "0"
  
  # Cleanup configuration
  JOB_CLEANUP_POLICY: "delete" # delete or retain
  
  # Monitoring configuration
  ENABLE_METRICS: "true"
  METRICS_PORT: "8080"
---
# PriorityClass for Critical Litmus Components
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: litmus-critical
value: 1000000
globalDefault: false
description: "Priority class for critical Litmus chaos operator components"
---
# PriorityClass for Chaos Experiment Jobs
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: litmus-chaos-job
value: 100000
globalDefault: false
description: "Priority class for Litmus chaos experiment jobs"
