# Complete Litmus Installation for Kubernetes
# This includes CRDs, Operator, and optional Portal

---
# Install this file after litmus-namespace.yaml
# kubectl apply -f litmus-namespace.yaml
# kubectl apply -f litmus-install.yaml

# Note: For production, use Helm installation instead
# This is a minimal installation for testing

---
# Litmus ChaosEngine CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chaosengines.litmuschaos.io
spec:
  group: litmuschaos.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                appinfo:
                  type: object
                  properties:
                    appns:
                      type: string
                    applabel:
                      type: string
                    appkind:
                      type: string
                annotationCheck:
                  type: string
                engineState:
                  type: string
                chaosServiceAccount:
                  type: string
                experiments:
                  type: array
                  items:
                    type: object
                jobCleanUpPolicy:
                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: EngineStatus
          type: string
          jsonPath: .status.engineStatus
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: chaosengines
    singular: chaosengine
    kind: ChaosEngine
    shortNames:
      - ce
---
# Litmus ChaosExperiment CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chaosexperiments.litmuschaos.io
spec:
  group: litmuschaos.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: chaosexperiments
    singular: chaosexperiment
    kind: ChaosExperiment
    shortNames:
      - exp
---
# Litmus ChaosResult CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chaosresults.litmuschaos.io
spec:
  group: litmuschaos.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Verdict
          type: string
          jsonPath: .status.experimentStatus.verdict
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: chaosresults
    singular: chaosresult
    kind: ChaosResult
    shortNames:
      - cr
---
# Litmus Chaos Operator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-operator
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litmus
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litmus
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: litmus-admin
      containers:
      - name: chaos-operator
        image: litmuschaos/chaos-operator:3.10.0
        imagePullPolicy: IfNotPresent
        command:
        - chaos-operator
        env:
        - name: CHAOS_RUNNER_IMAGE
          value: "litmuschaos/chaos-runner:3.10.0"
        - name: WATCH_NAMESPACE
          value: ""
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: "chaos-operator"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 125m
            memory: 300Mi
          limits:
            cpu: 500m
            memory: 500Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 2000
          allowPrivilegeEscalation: false
---
# Chaos Operator Service (for metrics)
apiVersion: v1
kind: Service
metadata:
  name: chaos-operator-metrics
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: operator
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: operator
---
# ServiceMonitor for Prometheus (optional)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chaos-operator-metrics
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: litmus
      app.kubernetes.io/component: operator
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
# Chaos Exporter Deployment (for experiment metrics)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-exporter
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litmus
      app.kubernetes.io/component: exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litmus
        app.kubernetes.io/component: exporter
    spec:
      serviceAccountName: litmus-admin
      containers:
      - name: chaos-exporter
        image: litmuschaos/chaos-exporter:3.10.0
        imagePullPolicy: IfNotPresent
        command:
        - /chaos-exporter
        args:
        - -c
        - litmus-admin
        env:
        - name: TSDB_SCRAPE_INTERVAL
          value: "10"
        - name: WATCH_NAMESPACE
          value: ""
        ports:
        - name: metrics
          containerPort: 8080
        resources:
          requests:
            cpu: 125m
            memory: 300Mi
          limits:
            cpu: 500m
            memory: 500Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 2000
          allowPrivilegeEscalation: false
---
# Chaos Exporter Service
apiVersion: v1
kind: Service
metadata:
  name: chaos-exporter
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: exporter
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: exporter
---
# ServiceMonitor for Chaos Exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chaos-exporter
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: litmus
      app.kubernetes.io/component: exporter
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
