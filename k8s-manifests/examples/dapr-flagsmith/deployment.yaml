apiVersion: v1
kind: ServiceAccount
metadata:
  name: dotconfig-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotconfig
  namespace: default
  labels:
    app: dotconfig
  annotations:
    featureflags.enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotconfig
  template:
    metadata:
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "dotconfig"
        dapr.io/app-port: "8080"
        dapr.io/config: "dapr-config"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        app: dotconfig
    spec:
      serviceAccountName: dotconfig-sa
      containers:
      - name: dotconfig
        image: yurikrupnik/dotconfig:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info,debug"
        - name: FLAGSMITH_API_URL
          value: "http://flagsmith-api.flagsmith.svc.cluster.local:8000/api/v1"
        - name: FLAGSMITH_ENV_KEY
          valueFrom:
            secretKeyRef:
              name: flagsmith-secret
              key: env-key
        - name: NATS_URL
          value: "nats://data.nats.svc.cluster.local:4222"
        - name: REDIS_URL
          value: "redis://redis-master.data.svc.cluster.local:6379"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: dotconfig-config
---
apiVersion: v1
kind: Service
metadata:
  name: dotconfig
  namespace: default
  labels:
    app: dotconfig
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: dotconfig
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dotconfig-config
  namespace: default
data:
  config.yaml: |
    server:
      port: 8080
    features:
      new_feature: true
      experimental: false
    observability:
      metrics:
        enabled: true
        path: /metrics
      tracing:
        enabled: true
        endpoint: http://jaeger-collector.istio-system.svc.cluster.local:14268/api/traces
      logging:
        level: info
    integrations:
      dapr:
        enabled: true
        port: 3500
      nats:
        enabled: true
        subjects:
          - dotconfig.events
          - dotconfig.commands
      flagsmith:
        enabled: true
