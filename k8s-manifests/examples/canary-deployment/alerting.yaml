apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: success-rate
  namespace: istio-system
spec:
  provider:
    type: prometheus
    address: http://prometheus-stack-kube-prom-prometheus.monitoring:9090
  query: |
    sum(
      rate(
        http_requests_total{
          namespace="{{ namespace }}",
          ingress="{{ target }}",
          status=~"2.."
        }[{{ interval }}]
      )
    ) 
    / 
    sum(
      rate(
        http_requests_total{
          namespace="{{ namespace }}",
          ingress="{{ target }}"
        }[{{ interval }}]
      )
    )
---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: latency
  namespace: istio-system
spec:
  provider:
    type: prometheus
    address: http://prometheus-stack-kube-prom-prometheus.monitoring:9090
  query: |
    histogram_quantile(0.99,
      sum(
        rate(
          http_request_duration_seconds_bucket{
            namespace="{{ namespace }}",
            ingress="{{ target }}"
          }[{{ interval }}]
        )
      ) by (le)
    )
---
apiVersion: flagger.app/v1beta1
kind: AlertProvider
metadata:
  name: slack
  namespace: istio-system
spec:
  type: slack
  address: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
  username: flagger
---
apiVersion: flagger.app/v1beta1
kind: AlertProvider
metadata:
  name: discord
  namespace: istio-system
spec:
  type: discord
  address: https://discord.com/api/webhooks/YOUR/WEBHOOK/URL
  username: flagger
