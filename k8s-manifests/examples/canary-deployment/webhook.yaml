apiVersion: v1
kind: ServiceAccount
metadata:
  name: flagger-loadtester
  namespace: default
---
apiVersion: v1
kind: Service
metadata:
  name: flagger-loadtester
  namespace: default
  labels:
    app: flagger-loadtester
spec:
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app: flagger-loadtester
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagger-loadtester
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flagger-loadtester
  template:
    metadata:
      labels:
        app: flagger-loadtester
    spec:
      serviceAccountName: flagger-loadtester
      containers:
        - name: loadtester
          image: ghcr.io/fluxcd/flagger-loadtester:latest
          ports:
            - containerPort: 8080
              name: http
          command:
            - /loadtester
          args:
            - -log-level=info
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: webhook-ping
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: ping
          image: curlimages/curl
          command:
            - sh
            - -c
            - |
              echo "Testing webhook..."
              curl -X POST http://flagger-loadtester/gate/approval \
                -H "Content-Type: application/json" \
                -d '{"name":"test-webhook","namespace":"default"}'
          restartPolicy: Never
      backoffLimit: 3
