apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: dotconfig
  namespace: default
spec:
  host: dotconfig
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
        tcpKeepalive:
          time: 7200s
          interval: 75s
    outlierDetection:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    loadBalancer:
      consistentHash:
        httpCookie:
          name: user_session
          ttl: 600s
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: dotconfig
  namespace: default
spec:
  hosts:
    - dotconfig
  http:
  - match:
    - headers:
        x-env:
          exact: canary
    route:
    - destination:
        host: dotconfig
        subset: canary
  - route:
    - destination:
        host: dotconfig
        subset: stable
      weight: 100
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,connect-failure,refused-stream
    timeout: 3s
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 50ms
      abort:
        percentage:
          value: 0.01
        httpStatus: 503
