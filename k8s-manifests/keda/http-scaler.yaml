# KEDA HTTP Add-on Scaler
# Scale based on incoming HTTP requests (requires KEDA HTTP Add-on)

# Install KEDA HTTP Add-on first:
# helm install http-add-on kedacore/keda-add-ons-http --namespace keda

apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: dotconfig-http-scaler
  labels:
    app: dotconfig
spec:
  hosts:
    - dotconfig.example.com
    - api.dotconfig.example.com
  pathPrefixes:
    - /api
    - /health
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
    service: dotconfig
    port: 8080
  replicas:
    min: 1
    max: 10
  scalingMetric:
    requestRate:
      targetValue: 100  # requests per second per replica
      granularity: 1s
      window: 1m
    concurrency:
      targetValue: 50   # concurrent requests per replica
  scaledownPeriod: 300
---
# Alternative: Using Prometheus with HTTP metrics
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-http-prometheus-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    # HTTP requests per second
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: http_requests_total
        query: sum(rate(http_requests_total{app="dotconfig"}[1m]))
        threshold: "100"

    # Active connections
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: http_active_connections
        query: sum(http_active_connections{app="dotconfig"})
        threshold: "50"
