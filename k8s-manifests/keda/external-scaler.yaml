# KEDA External Scaler
# Custom metrics from external sources (Dapr, custom APIs, etc.)

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-external-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    # External metrics API
    - type: metrics-api
      metadata:
        targetValue: "100"
        activationTargetValue: "10"
        url: "http://metrics-api.default.svc.cluster.local/api/v1/metrics/pending-tasks"
        valueLocation: "value"

    # External scaler (gRPC)
    - type: external
      metadata:
        scalerAddress: "external-scaler.keda.svc.cluster.local:9090"
        metricName: "custom_metric"
        threshold: "50"
---
# Dapr Pub/Sub Scaler (messages in topic)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-dapr-pubsub-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    # Scale based on Dapr pub/sub messages
    # Requires custom external scaler for Dapr
    - type: external
      metadata:
        scalerAddress: "dapr-scaler.keda.svc.cluster.local:9090"
        pubsubName: "events"
        topic: "skill.completed"
        threshold: "10"
---
# InfluxDB Scaler (custom metrics from InfluxDB)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-influxdb-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: influxdb
      metadata:
        serverURL: http://influxdb.default.svc.cluster.local:8086
        organizationName: dotconfig
        query: |
          from(bucket: "telemetry")
            |> range(start: -5m)
            |> filter(fn: (r) => r._measurement == "app_metrics" and r._field == "pending_requests")
            |> mean()
        thresholdValue: "50"
        activationThresholdValue: "5"
        authToken: "${INFLUXDB_TOKEN}"
