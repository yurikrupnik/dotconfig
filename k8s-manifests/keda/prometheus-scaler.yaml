# KEDA ScaledObject - Prometheus Scaler
# Scale based on Prometheus metrics (request rate, latency, etc.)

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-prometheus-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  fallback:
    failureThreshold: 3
    replicas: 2
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 4
              periodSeconds: 15
          selectPolicy: Max
  triggers:
    # Scale on request rate
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: http_requests_per_second
        query: sum(rate(http_requests_total{app="dotconfig"}[2m]))
        threshold: "100"
        activationThreshold: "10"

    # Scale on response latency
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: http_request_latency_p95
        query: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{app="dotconfig"}[5m])) by (le))
        threshold: "0.5"
        activationThreshold: "0.1"

    # Scale on error rate
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: http_error_rate
        query: sum(rate(http_requests_total{app="dotconfig",status=~"5.."}[5m])) / sum(rate(http_requests_total{app="dotconfig"}[5m]))
        threshold: "0.1"
        activationThreshold: "0.01"
