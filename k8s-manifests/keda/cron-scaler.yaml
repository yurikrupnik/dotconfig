# KEDA ScaledObject - Cron Scaler
# Time-based scaling for predictable load patterns

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-cron-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 60
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    # Business hours scaling (Mon-Fri 9am-6pm)
    - type: cron
      metadata:
        timezone: America/New_York
        start: 0 9 * * 1-5    # 9:00 AM Mon-Fri
        end: 0 18 * * 1-5     # 6:00 PM Mon-Fri
        desiredReplicas: "5"

    # Peak hours (12pm-2pm)
    - type: cron
      metadata:
        timezone: America/New_York
        start: 0 12 * * 1-5   # 12:00 PM Mon-Fri
        end: 0 14 * * 1-5     # 2:00 PM Mon-Fri
        desiredReplicas: "8"

    # Night/weekend scaling
    - type: cron
      metadata:
        timezone: America/New_York
        start: 0 18 * * 1-5   # 6:00 PM Mon-Fri
        end: 0 9 * * 1-5      # 9:00 AM Mon-Fri
        desiredReplicas: "2"

    # Weekend minimal
    - type: cron
      metadata:
        timezone: America/New_York
        start: 0 0 * * 0,6    # Saturday and Sunday
        end: 0 0 * * 1        # Monday
        desiredReplicas: "1"
---
# Scale to zero at night (cost optimization)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-night-scaler
  labels:
    app: dotconfig-dev
    environment: development
spec:
  scaleTargetRef:
    name: dotconfig-dev
    kind: Deployment
  pollingInterval: 60
  cooldownPeriod: 60
  minReplicaCount: 0  # Allow scale to zero
  maxReplicaCount: 5
  triggers:
    # Active during work hours only
    - type: cron
      metadata:
        timezone: America/New_York
        start: 0 8 * * 1-5    # 8:00 AM Mon-Fri
        end: 0 20 * * 1-5     # 8:00 PM Mon-Fri
        desiredReplicas: "2"
