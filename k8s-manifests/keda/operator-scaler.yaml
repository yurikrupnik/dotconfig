# KEDA ScaledObject for the Operator
# Scale operator based on number of nodes to monitor

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: operator-node-scaler
  labels:
    app: operator
spec:
  scaleTargetRef:
    name: operator
    kind: Deployment
  pollingInterval: 60
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    # Scale based on number of nodes in cluster
    - type: kubernetes-workload
      metadata:
        podSelector: ""  # All pods
        value: "100"     # 1 operator per 100 pods

    # Or scale based on Prometheus node count
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: kube_node_count
        query: count(kube_node_info)
        threshold: "10"  # 1 operator per 10 nodes
---
# ScaledJob for node metrics collection
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: operator-metrics-job
  labels:
    app: operator-metrics
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    backoffLimit: 3
    template:
      metadata:
        labels:
          app: operator-metrics
      spec:
        serviceAccountName: operator-sa
        containers:
          - name: operator
            image: yurikrupnik/operator:latest
            resources:
              limits:
                memory: "128Mi"
                cpu: "100m"
        restartPolicy: Never
  pollingInterval: 60
  minReplicaCount: 0
  maxReplicaCount: 1
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  triggers:
    # Run every 5 minutes via cron
    - type: cron
      metadata:
        timezone: UTC
        start: "*/5 * * * *"
        end: "*/5 * * * *"
        desiredReplicas: "1"
