# KEDA ScaledObject - CPU/Memory Scaler
# Resource-based scaling (similar to HPA but with KEDA features)

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-resource-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 10
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 4
              periodSeconds: 15
  triggers:
    # CPU utilization
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"

    # Memory utilization
    - type: memory
      metricType: Utilization
      metadata:
        value: "80"
---
# Combined: CPU/Memory + Prometheus metrics
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-hybrid-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 15
  triggers:
    # CPU
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"

    # Memory
    - type: memory
      metricType: Utilization
      metadata:
        value: "75"

    # Request rate (Prometheus)
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: http_requests_rate
        query: sum(rate(http_requests_total{app="dotconfig"}[2m]))
        threshold: "100"

    # Queue length (Redis)
    - type: redis
      metadata:
        address: redis.default.svc.cluster.local:6379
        listName: task-queue
        listLength: "20"
