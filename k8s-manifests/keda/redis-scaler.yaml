# KEDA ScaledObject - Redis Scaler
# Scale based on Redis list/stream length (job queue)

apiVersion: v1
kind: Secret
metadata:
  name: redis-connection
type: Opaque
stringData:
  address: redis.default.svc.cluster.local:6379
  password: ""
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: redis-auth
spec:
  secretTargetRef:
    - parameter: address
      name: redis-connection
      key: address
    - parameter: password
      name: redis-connection
      key: password
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotconfig-redis-scaler
  labels:
    app: dotconfig
spec:
  scaleTargetRef:
    name: dotconfig
    kind: Deployment
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 0  # Scale to zero when no jobs
  maxReplicaCount: 20
  triggers:
    # Scale on Redis List length (job queue)
    - type: redis
      metadata:
        listName: job-queue
        listLength: "10"  # 1 pod per 10 jobs
        activationListLength: "1"
        databaseIndex: "0"
      authenticationRef:
        name: redis-auth

    # Scale on Redis Stream pending messages
    - type: redis-streams
      metadata:
        stream: events-stream
        consumerGroup: dotconfig-workers
        pendingEntriesCount: "50"
        activationLagCount: "5"
        databaseIndex: "0"
      authenticationRef:
        name: redis-auth
---
# ScaledJob for batch processing
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: dotconfig-batch-job
  labels:
    app: dotconfig-batch
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    backoffLimit: 3
    template:
      spec:
        containers:
          - name: batch-processor
            image: yurikrupnik/dotconfig:latest
            args: ["batch", "process"]
            env:
              - name: REDIS_URL
                value: "redis://redis.default.svc.cluster.local:6379"
        restartPolicy: Never
  pollingInterval: 30
  minReplicaCount: 0
  maxReplicaCount: 10
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  triggers:
    - type: redis
      metadata:
        listName: batch-queue
        listLength: "1"
        activationListLength: "1"
      authenticationRef:
        name: redis-auth
