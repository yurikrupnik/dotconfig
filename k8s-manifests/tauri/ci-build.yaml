# Tauri CI Build Jobs
# Build Tauri desktop apps in Kubernetes using Docker images
apiVersion: v1
kind: ConfigMap
metadata:
  name: tauri-build-scripts
  namespace: tauri
data:
  build.sh: |
    #!/bin/bash
    set -e

    echo "=== Tauri Build Pipeline ==="

    # Install dependencies
    cd /workspace

    # Frontend build
    echo "Building frontend..."
    npm ci
    npm run build

    # Tauri build
    echo "Building Tauri app..."
    cargo tauri build --target $TARGET

    # Copy artifacts
    echo "Copying artifacts..."
    cp -r src-tauri/target/release/bundle/* /artifacts/

    echo "=== Build Complete ==="
    ls -la /artifacts/
---
# Job template for building Linux targets
apiVersion: batch/v1
kind: Job
metadata:
  name: tauri-build-linux
  namespace: tauri
  labels:
    app: tauri-build
    target: linux
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: tauri-build
    spec:
      containers:
        - name: tauri-builder
          # Full-featured Tauri Docker image
          image: ivangabriele/tauri:debian-bookworm-20
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              cd /workspace
              # Clone or use mounted source
              if [ -d "/source" ]; then
                cp -r /source/* .
              fi

              # Install JS dependencies
              npm ci || yarn install --frozen-lockfile || pnpm install --frozen-lockfile

              # Build frontend
              npm run build || yarn build || pnpm build

              # Build Tauri
              cargo tauri build

              # Output location
              echo "Build artifacts:"
              find src-tauri/target/release/bundle -type f -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" 2>/dev/null || true
          env:
            - name: TARGET
              value: "x86_64-unknown-linux-gnu"
            - name: CARGO_HOME
              value: "/cargo"
            - name: RUSTUP_HOME
              value: "/rustup"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: artifacts
              mountPath: /artifacts
            - name: cargo-cache
              mountPath: /cargo
            - name: npm-cache
              mountPath: /root/.npm
      restartPolicy: Never
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: tauri-source-pvc
        - name: workspace
          emptyDir: {}
        - name: artifacts
          persistentVolumeClaim:
            claimName: tauri-artifacts-pvc
        - name: cargo-cache
          persistentVolumeClaim:
            claimName: cargo-cache-pvc
        - name: npm-cache
          emptyDir: {}
---
# PVCs for build caching
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cargo-cache-pvc
  namespace: tauri
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tauri-artifacts-pvc
  namespace: tauri
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tauri-source-pvc
  namespace: tauri
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# CronJob for nightly builds
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tauri-nightly-build
  namespace: tauri
spec:
  schedule: "0 2 * * *"  # 2 AM daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: tauri-build
            type: nightly
        spec:
          containers:
            - name: tauri-builder
              image: ivangabriele/tauri:debian-bookworm-20
              command: ["/bin/bash", "-c"]
              args:
                - |
                  # Clone latest from git
                  git clone --depth 1 ${GIT_REPO} /workspace
                  cd /workspace

                  npm ci
                  npm run build
                  cargo tauri build

                  # Upload artifacts (customize for your storage)
                  echo "Build complete at $(date)"
              env:
                - name: GIT_REPO
                  valueFrom:
                    configMapKeyRef:
                      name: tauri-build-config
                      key: git_repo
              resources:
                requests:
                  memory: "2Gi"
                  cpu: "1000m"
                limits:
                  memory: "8Gi"
                  cpu: "4000m"
          restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tauri-build-config
  namespace: tauri
data:
  git_repo: "https://github.com/yurikrupnik/tauri-app.git"
  node_version: "20"
  rust_version: "stable"
