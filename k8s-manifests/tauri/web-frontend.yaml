# Tauri Web Frontend
# The web version of your Tauri app served via nginx/caddy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tauri-web
  namespace: tauri
  labels:
    app: tauri-web
    app.kubernetes.io/name: tauri-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tauri-web
  template:
    metadata:
      labels:
        app: tauri-web
        app.kubernetes.io/name: tauri-web
    spec:
      containers:
        - name: tauri-web
          # Built from: docker build -f Dockerfile.web -t tauri-web .
          image: yurikrupnik/tauri-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: VITE_API_URL
              value: "http://tauri-backend:8080"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: tauri-web
  namespace: tauri
  labels:
    app: tauri-web
spec:
  selector:
    app: tauri-web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tauri-web-ingress
  namespace: tauri
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # For Istio gateway
    # kubernetes.io/ingress.class: istio
spec:
  ingressClassName: nginx
  rules:
    - host: tauri.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tauri-web
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tauri-backend
                port:
                  number: 8080
