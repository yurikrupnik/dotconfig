# Tauri Backend/API Service
# This is the Rust backend that Tauri desktop apps connect to
apiVersion: v1
kind: Namespace
metadata:
  name: tauri
  labels:
    app.kubernetes.io/part-of: tauri-stack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tauri-backend
  namespace: tauri
  labels:
    app: tauri-backend
    app.kubernetes.io/name: tauri-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tauri-backend
  template:
    metadata:
      labels:
        app: tauri-backend
        app.kubernetes.io/name: tauri-backend
    spec:
      containers:
        - name: tauri-backend
          image: yurikrupnik/tauri-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: tauri-backend
  namespace: tauri
  labels:
    app: tauri-backend
spec:
  selector:
    app: tauri-backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: grpc
      protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
# HPA for auto-scaling based on load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tauri-backend-hpa
  namespace: tauri
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tauri-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
