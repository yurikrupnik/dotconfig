# CronJob for scheduled metrics collection
# This runs the resource-stats-operator collect command on a schedule
# and saves the metrics to a ResourceStats CRD
apiVersion: batch/v1
kind: CronJob
metadata:
  name: resource-stats-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: resource-stats-collector
    app.kubernetes.io/component: cronjob
spec:
  # Run every 5 minutes
  schedule: "*/5 * * * *"
  # Keep 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # Auto-cleanup completed jobs after 1 hour
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: resource-stats-collector
        spec:
          serviceAccountName: resource-stats-operator
          restartPolicy: OnFailure
          containers:
            - name: collector
              image: ghcr.io/yurikrupnik/resource-stats-operator:latest
              imagePullPolicy: IfNotPresent
              command:
                - /resource-stats-operator
              args:
                - collect
                - --format=json
                - --save-to-crd=cluster-metrics
                - --namespace=monitoring
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
---
# Alternative: Hourly collection for cost tracking
apiVersion: batch/v1
kind: CronJob
metadata:
  name: resource-stats-hourly
  namespace: monitoring
  labels:
    app.kubernetes.io/name: resource-stats-collector
    app.kubernetes.io/component: hourly-cronjob
spec:
  # Run every hour at minute 0
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 24
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: resource-stats-hourly
        spec:
          serviceAccountName: resource-stats-operator
          restartPolicy: OnFailure
          containers:
            - name: collector
              image: ghcr.io/yurikrupnik/resource-stats-operator:latest
              imagePullPolicy: IfNotPresent
              command:
                - /resource-stats-operator
              args:
                - collect
                - --format=json
                - --save-to-crd=cluster-metrics-hourly
                - --namespace=monitoring
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
