---
# Mutating Webhook Configuration
# Injects ownership annotations on resource creation
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: platform-operator-ownership
  labels:
    app: platform-operator
spec:
  webhooks:
    - name: ownership.platform.yurikrupnik.com
      admissionReviewVersions: ["v1"]
      clientConfig:
        service:
          name: platform-operator-webhook
          namespace: platform-system
          path: /mutate/ownership
          port: 8443
        # In production, use a properly signed CA bundle
        # caBundle: <base64-encoded-ca-cert>
      rules:
        - apiGroups: ["platform.yurikrupnik.com"]
          apiVersions: ["v1alpha1"]
          operations: ["CREATE"]
          resources:
            - buckets
            - platformapps
            - gitopsapps
            - crossplaneresources
            - externalsecretconfigs
          scope: Namespaced
      failurePolicy: Ignore
      matchPolicy: Equivalent
      sideEffects: None
      timeoutSeconds: 10
---
# Validating Webhook Configuration
# Enforces RBAC policies based on Google Workspace groups
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: platform-operator-authz
  labels:
    app: platform-operator
spec:
  webhooks:
    - name: authz.platform.yurikrupnik.com
      admissionReviewVersions: ["v1"]
      clientConfig:
        service:
          name: platform-operator-webhook
          namespace: platform-system
          path: /validate/authz
          port: 8443
        # In production, use a properly signed CA bundle
        # caBundle: <base64-encoded-ca-cert>
      rules:
        - apiGroups: ["platform.yurikrupnik.com"]
          apiVersions: ["v1alpha1"]
          operations: ["CREATE", "UPDATE"]
          resources:
            - buckets
            - platformapps
            - gitopsapps
            - crossplaneresources
            - externalsecretconfigs
          scope: Namespaced
      failurePolicy: Ignore
      matchPolicy: Equivalent
      sideEffects: None
      timeoutSeconds: 10
---
# Service for webhook endpoints
apiVersion: v1
kind: Service
metadata:
  name: platform-operator-webhook
  namespace: platform-system
  labels:
    app: platform-operator
spec:
  ports:
    - name: webhook
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    app: platform-operator
