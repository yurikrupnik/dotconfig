---
# Crossplane - Cloud Resource Provisioning
# Installed via PlatformApp operator using Helm
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  name: crossplane
  namespace: crossplane-system
  installationType: helm
  helm:
    chart: crossplane
    repository: https://charts.crossplane.io/stable
    version: "1.17.0"
    wait: true
    timeout: 600
    values:
      # Replicas
      replicas: 1

      # Resources
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # RBAC Manager
      rbacManager:
        deploy: true
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

      # Provider configuration
      provider:
        packages: []
        # Uncomment to install providers automatically:
        # - xpkg.upbound.io/crossplane-contrib/provider-aws:v1.0.0
        # - xpkg.upbound.io/crossplane-contrib/provider-gcp:v1.0.0
        # - xpkg.upbound.io/crossplane-contrib/provider-azure:v1.0.0
        # - xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v0.14.0
        # - xpkg.upbound.io/crossplane-contrib/provider-helm:v0.19.0

      # Metrics
      metrics:
        enabled: true

      # Webhooks
      webhooks:
        enabled: true

      # Pod Security
      podSecurityContextCrossplane:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532

      # Service Account
      serviceAccount:
        create: true

      # Args for Crossplane
      args:
        - --enable-composition-functions
        - --enable-environment-configs
---
# AWS Provider (optional - apply separately if needed)
# apiVersion: pkg.crossplane.io/v1
# kind: Provider
# metadata:
#   name: provider-aws
# spec:
#   package: xpkg.upbound.io/crossplane-contrib/provider-aws:v1.0.0
