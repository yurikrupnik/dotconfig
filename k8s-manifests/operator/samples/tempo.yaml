---
# Grafana Tempo - Distributed Tracing Backend
# Installed via PlatformApp operator using Helm
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: tempo
  namespace: observability
spec:
  name: tempo
  namespace: observability
  installationType: helm
  helm:
    chart: tempo
    repository: https://grafana.github.io/helm-charts
    version: "1.10.0"
    wait: true
    timeout: 600
#    valuesInline: true
#    valuesFrom:
#      - configMapKeyRef:
#          name: tempo-helm-values
#      - secretKeyRef:
#          name: tempo-helm-values
    values:
      # Tempo configuration
      tempo:
        # Storage configuration
        storage:
          trace:
            backend: local
            local:
              path: /var/tempo/traces
            wal:
              path: /var/tempo/wal

        # Receivers configuration
        receivers:
          jaeger:
            protocols:
              thrift_http:
                endpoint: "0.0.0.0:14268"
              grpc:
                endpoint: "0.0.0.0:14250"
              thrift_binary:
                endpoint: "0.0.0.0:6832"
              thrift_compact:
                endpoint: "0.0.0.0:6831"
          zipkin:
            endpoint: "0.0.0.0:9411"
          otlp:
            protocols:
              http:
                endpoint: "0.0.0.0:4318"
              grpc:
                endpoint: "0.0.0.0:4317"

        # Query configuration
        querier:
          frontend_worker:
            frontend_address: tempo:9095

        # Metrics generator for span metrics
        metricsGenerator:
          enabled: true
          remoteWriteUrl: "http://prometheus-kube-prometheus-prometheus.observability.svc:9090/api/v1/write"

      # Persistence
      persistence:
        enabled: true
        size: 10Gi

      # Resources
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # Service
      service:
        type: ClusterIP

      # ServiceMonitor for Prometheus
      serviceMonitor:
        enabled: true
