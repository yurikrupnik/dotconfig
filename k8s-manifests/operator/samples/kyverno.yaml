---
# Kyverno - Kubernetes Native Policy Management
# Installed via PlatformApp operator using Helm
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: kyverno
  namespace: kyverno
spec:
  name: kyverno
  namespace: kyverno
  installationType: helm
  helm:
    chart: kyverno
    repository: https://kyverno.github.io/kyverno
    version: "3.2.0"
    wait: true
    timeout: 600
    values:
      # CRDs
      crds:
        install: true

      # Admission Controller
      admissionController:
        replicas: 1
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        # Container security context
        container:
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      # Background Controller
      backgroundController:
        enabled: true
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

      # Cleanup Controller
      cleanupController:
        enabled: true
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

      # Reports Controller
      reportsController:
        enabled: true
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

      # Webhooks configuration
      config:
        # Exclude namespaces from policy enforcement
        webhooks:
          - namespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: NotIn
                  values:
                    - kube-system
                    - kyverno

      # Features
      features:
        # Generate reports for policy results
        policyReports:
          enabled: true
        # Auto-generate rules for Pod controllers
        autoUpdateWebhooks:
          enabled: true

      # Metrics for Prometheus
      serviceMonitor:
        enabled: true
        namespace: observability
---
