---
# AI Stack - Workflow Automation and LLM Tools
#
# Components:
#   - n8n: Workflow automation (like Zapier)
#   - Flowise: LLM flow builder (drag-and-drop LangChain)
#
# Usage:
#   kubectl apply -f ai-stack.yaml

# Namespace
---
apiVersion: v1
kind: Namespace
metadata:
  name: ai
  labels:
    app.kubernetes.io/part-of: ai-stack

# Secrets
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secrets
  namespace: ai
type: Opaque
stringData:
  encryption-key: "change-this-to-a-random-32-char-string"
---
apiVersion: v1
kind: Secret
metadata:
  name: flowise-secrets
  namespace: ai
type: Opaque
stringData:
  password: "change-this-password"
  api-key: "change-this-api-key"

# n8n - Workflow Automation
---
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: n8n
  namespace: ai
  labels:
    app.kubernetes.io/part-of: ai-stack
spec:
  name: n8n
  namespace: ai
  installationType: helm
  helm:
    chart: n8n
    repository: https://8gears.github.io/n8n-helm-chart
    version: "0.25.0"
    wait: true
    timeout: 600
    values:
      replicaCount: 1
      image:
        repository: n8nio/n8n
        tag: "1.64.3"
      service:
        type: ClusterIP
        port: 5678
      config:
        generic:
          timezone: "UTC"
        database:
          type: sqlite
      persistence:
        enabled: true
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi

# Flowise - LLM Flow Builder
---
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: flowise
  namespace: ai
  labels:
    app.kubernetes.io/part-of: ai-stack
spec:
  name: flowise
  namespace: ai
  installationType: helm
  helm:
    chart: flowise
    repository: https://cowboysysop.github.io/charts
    version: "3.4.0"
    wait: true
    timeout: 600
    values:
      replicaCount: 1
      image:
        repository: flowiseai/flowise
        tag: "2.1.1"
      service:
        type: ClusterIP
        port: 3000
      env:
        - name: FLOWISE_USERNAME
          value: "admin"
        - name: FLOWISE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flowise-secrets
              key: password
              optional: true
        - name: DATABASE_TYPE
          value: "sqlite"
        - name: DATABASE_PATH
          value: "/root/.flowise"
      persistence:
        enabled: true
        size: 10Gi
        mountPath: /root/.flowise
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi
