---
# External Secrets Operator - Sync secrets from external providers
# Installed via PlatformApp operator using Helm
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  name: external-secrets
  namespace: external-secrets
  installationType: helm
  helm:
    chart: external-secrets
    repository: https://charts.external-secrets.io
    version: "0.10.0"
    wait: true
    timeout: 300
    values:
      # Install CRDs
      installCRDs: true

      # Replicas
      replicaCount: 1

      # Leader election for HA
      leaderElect: true

      # Resources
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

      # Webhook for validation
      webhook:
        create: true
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

      # Cert controller for webhook certs
      certController:
        create: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

      # ServiceMonitor for Prometheus
      serviceMonitor:
        enabled: true
        namespace: observability

      # RBAC
      rbac:
        create: true

      # Service Account
      serviceAccount:
        create: true
