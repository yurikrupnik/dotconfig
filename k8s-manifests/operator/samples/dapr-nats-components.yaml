---
# Dapr Components for NATS integration
# These work with the NATS and Dapr PlatformApps

# NATS Pub/Sub Component
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub-nats
  namespace: default
spec:
  type: pubsub.nats
  version: v1
  metadata:
    - name: natsURL
      value: "nats://nats.nats-system.svc.cluster.local:4222"
    - name: consumerID
      value: "platform-consumer"
    # JetStream configuration
    - name: jetstream
      value: "true"
    - name: durableSubscriptionName
      value: "platform-durable"
---
# NATS State Store (using JetStream KV)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore-nats
  namespace: default
spec:
  type: state.jetstream
  version: v1
  metadata:
    - name: natsURL
      value: "nats://nats.nats-system.svc.cluster.local:4222"
    - name: bucket
      value: "platform-state"
---
# Platform Configuration Store
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: platform-config
  namespace: default
spec:
  tracing:
    samplingRate: "1"
    zipkin:
      endpointAddress: "http://zipkin.observability.svc.cluster.local:9411/api/v2/spans"
  metric:
    enabled: true
  mtls:
    enabled: true
  accessControl:
    defaultAction: allow
    trustDomain: "cluster.local"
