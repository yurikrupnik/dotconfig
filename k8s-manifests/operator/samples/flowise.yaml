---
# Flowise - LLM Flow Builder
# Installed via PlatformApp operator using Helm
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: flowise
  namespace: ai
spec:
  name: flowise
  namespace: ai
  installationType: helm
  helm:
    chart: flowise
    repository: https://cowboysysop.github.io/charts
    version: "3.4.0"
    wait: true
    timeout: 600
    values:
      # Replicas
      replicaCount: 1

      # Image
      image:
        repository: flowiseai/flowise
        tag: "2.1.1"
        pullPolicy: IfNotPresent

      # Service
      service:
        type: ClusterIP
        port: 3000

      # Ingress (disabled by default)
      ingress:
        enabled: false
        # annotations:
        #   kubernetes.io/ingress.class: nginx
        # hosts:
        #   - host: flowise.example.com
        #     paths:
        #       - path: /
        #         pathType: Prefix

      # Environment variables
      env:
        # Basic auth (optional)
        - name: FLOWISE_USERNAME
          value: "admin"
        - name: FLOWISE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flowise-secrets
              key: password
              optional: true
        # API key (optional)
        - name: FLOWISE_SECRETKEY_OVERWRITE
          valueFrom:
            secretKeyRef:
              name: flowise-secrets
              key: api-key
              optional: true
        # Database configuration
        - name: DATABASE_TYPE
          value: "sqlite"  # Change to postgres for production
        - name: DATABASE_PATH
          value: "/root/.flowise"
        # Storage for uploads
        - name: BLOB_STORAGE_PATH
          value: "/root/.flowise/storage"
        # Execution settings
        - name: EXECUTION_MODE
          value: "main"
        # Log level
        - name: LOG_LEVEL
          value: "info"
        # LLM settings
        - name: LANGCHAIN_TRACING_V2
          value: "false"

      # Persistence
      persistence:
        enabled: true
        size: 10Gi
        accessModes:
          - ReadWriteOnce
        mountPath: /root/.flowise

      # Resources
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi

      # Security context
      securityContext:
        runAsUser: 0  # Flowise requires root for some operations
        fsGroup: 0

      # Probes
      livenessProbe:
        enabled: true
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 60
        periodSeconds: 10
      readinessProbe:
        enabled: true
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 30
        periodSeconds: 5
---
# Flowise Secrets (create before deploying)
apiVersion: v1
kind: Secret
metadata:
  name: flowise-secrets
  namespace: ai
type: Opaque
stringData:
  password: "change-this-password"  # CHANGE THIS!
  api-key: "change-this-api-key"    # CHANGE THIS!
---
