---
# Sentry - Error Tracking and Performance Monitoring
# Self-hosted Sentry via PlatformApp operator using Helm
#
# Note: Sentry is complex and resource-intensive. For production,
# consider using Sentry SaaS (sentry.io) instead of self-hosted.
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: sentry
  namespace: observability
spec:
  name: sentry
  namespace: observability
  installationType: helm
  helm:
    chart: sentry
    repository: https://sentry-kubernetes.github.io/charts
    version: "23.11.0"
    wait: true
    timeout: 1200  # Sentry takes a while to start
    values:
      # User configuration
      user:
        create: true
        email: admin@example.com
        password: "changeme"  # CHANGE THIS IN PRODUCTION

      # System configuration
      system:
        secretKey: "generate-a-random-secret-key-here"  # CHANGE THIS

      # Nginx ingress (disabled - use your own ingress)
      nginx:
        enabled: false

      # Ingress configuration
      ingress:
        enabled: false
        # Enable and configure for your domain:
        # hostname: sentry.example.com
        # annotations:
        #   kubernetes.io/ingress.class: nginx

      # PostgreSQL (bundled)
      postgresql:
        enabled: true
        auth:
          postgresPassword: "sentry-postgres"  # CHANGE THIS
        primary:
          persistence:
            enabled: true
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      # Redis (bundled)
      redis:
        enabled: true
        architecture: standalone
        auth:
          enabled: false
        master:
          persistence:
            enabled: true
            size: 5Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

      # Kafka (bundled for event streaming)
      kafka:
        enabled: true
        replicaCount: 1
        persistence:
          enabled: true
          size: 10Gi
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        zookeeper:
          enabled: true
          replicaCount: 1
          persistence:
            enabled: true
            size: 5Gi

      # ClickHouse (for event storage)
      clickhouse:
        enabled: true
        clickhouse:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          persistentVolumeClaim:
            enabled: true
            dataPersistentVolume:
              enabled: true
              size: 20Gi

      # Symbolicator (for source maps)
      symbolicator:
        enabled: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

      # Sentry components resources
      sentry:
        web:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        worker:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        cron:
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        ingestConsumer:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      # Snuba (query engine)
      snuba:
        api:
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

      # Relay (event ingestion)
      relay:
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

      # ServiceMonitor
      serviceMonitor:
        enabled: true

      # Hooks for initialization
      hooks:
        enabled: true
        activeDeadlineSeconds: 600
---
# Lightweight alternative: Sentry Relay only (forwards to Sentry SaaS)
# Use this if you want error tracking but don't want to run full Sentry
