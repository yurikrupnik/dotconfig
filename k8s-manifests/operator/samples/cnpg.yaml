---
# CloudNativePG Operator
# Installed via PlatformApp operator using Helm
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: PlatformApp
metadata:
  name: cnpg-operator
  namespace: cnpg-system
spec:
  name: cnpg
  namespace: cnpg-system
  installationType: helm
  helm:
    chart: cloudnative-pg
    repository: https://cloudnative-pg.github.io/charts
    version: "0.21.0"
    wait: true
    timeout: 300
    values:
      # Monitoring
      monitoring:
        podMonitorEnabled: true
        grafanaDashboard:
          create: true
          namespace: observability

      # Resources
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # RBAC
      rbac:
        create: true

      # Service Account
      serviceAccount:
        create: true
---
# CNPG Cluster for Observability Stack (e.g., for Grafana)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: observability-postgres
  namespace: observability
spec:
  instances: 2

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  # Storage
  storage:
    size: 10Gi

  # Bootstrap - create initial database
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: grafana-db-credentials

  # Backup configuration (optional)
  # backup:
  #   barmanObjectStore:
  #     destinationPath: s3://backups/cnpg
  #     s3Credentials:
  #       accessKeyId:
  #         name: s3-creds
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: s3-creds
  #         key: SECRET_ACCESS_KEY

  # Monitoring
  monitoring:
    enablePodMonitor: true

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
---
# Database credentials secret
apiVersion: v1
kind: Secret
metadata:
  name: grafana-db-credentials
  namespace: observability
type: kubernetes.io/basic-auth
stringData:
  username: grafana
  password: grafana-db-password  # CHANGE THIS!
