# ResourceStats CRD Examples
# These resources are watched by the resource-stats-operator which
# automatically collects metrics and updates the status field
---
# Cluster-wide metrics collection (runs every minute)
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: ResourceStats
metadata:
  name: cluster-metrics
  namespace: monitoring
spec:
  scope: cluster
  # Collection interval
  interval: "1m"
  # Keep 24 hours of history
  retention: "24h"
  # Enable GPU metrics if available
  collectGpu: false
  # Optional: reference a CostConfig for pricing
  # costConfigRef:
  #   name: default-pricing
  #   namespace: monitoring
---
# Node-specific metrics
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: ResourceStats
metadata:
  name: worker-node-metrics
  namespace: monitoring
spec:
  scope: node
  targetRef:
    kind: Node
    name: worker-1
  interval: "30s"
  retention: "12h"
---
# Namespace metrics (track a specific namespace)
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: ResourceStats
metadata:
  name: production-ns-metrics
  namespace: monitoring
spec:
  scope: namespace
  targetRef:
    kind: Namespace
    name: production
  interval: "1m"
  retention: "24h"
---
# Deployment metrics
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: ResourceStats
metadata:
  name: api-deployment-metrics
  namespace: monitoring
spec:
  scope: deployment
  targetRef:
    kind: Deployment
    name: api-server
    namespace: production
  interval: "30s"
  retention: "6h"
---
# CostConfig for pricing calculations
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: CostConfig
metadata:
  name: default-pricing
  namespace: monitoring
spec:
  # Currency for cost calculations
  currency: USD
  # Default rates (per hour)
  defaultRates:
    cpuPerCore: "0.048"
    memoryPerGiB: "0.006"
    gpuPerUnit: "0.50"
  # Instance-specific pricing overrides
  instancePricing:
    - instanceType: "t3.medium"
      cpuPerCore: "0.0416"
      memoryPerGiB: "0.0052"
    - instanceType: "t3.large"
      cpuPerCore: "0.0832"
      memoryPerGiB: "0.0104"
    - instanceType: "m5.large"
      cpuPerCore: "0.096"
      memoryPerGiB: "0.012"
    - instanceType: "g4dn.xlarge"
      cpuPerCore: "0.526"
      memoryPerGiB: "0.066"
      gpuPerUnit: "0.50"
  # Spot pricing discounts
  spotDiscountPercent: 70
