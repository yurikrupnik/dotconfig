---
# Example GoogleWorkspaceConfig
# Configures Google Workspace integration for user sync and RBAC
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: GoogleWorkspaceConfig
metadata:
  name: company-workspace
spec:
  # Your Google Workspace domain
  domain: company.com

  # Google Workspace customer ID (found in Admin Console > Account > Account settings)
  customerId: C02abcdef

  # Service account authentication
  auth:
    # Reference to K8s Secret containing service account JSON key
    serviceAccountKeyRef:
      name: google-workspace-sa
      key: key.json
      namespace: platform-system
    # Admin email for domain-wide delegation
    adminEmail: admin@company.com

  # User and group sync settings
  sync:
    # How often to sync from Google Workspace
    interval: 5m
    # Enable user sync
    syncUsers: true
    # Enable group sync
    syncGroups: true
    # Namespace where GoogleWorkspaceUser/Group CRs are created
    targetNamespace: platform-users
    # Optional: only sync users in these org units
    # userFilter:
    #   orgUnitPath: /Engineering

  # RBAC policy for resource authorization
  rbacPolicy:
    # Default action when no rule matches
    defaultAction: Deny
    rules:
      # Developers can create Buckets and PlatformApps in dev/staging
      - name: developers-can-create-resources
        groups:
          - developers@company.com
          - engineering@company.com
        allowedResources:
          - Bucket
          - PlatformApp
        maxResourcesPerUser: 10
        allowedNamespaces:
          - dev
          - staging

      # DevOps can create all resources
      - name: devops-full-access
        groups:
          - devops@company.com
          - platform-team@company.com
        allowedResources:
          - "*"
        maxResourcesPerUser: 0  # 0 = unlimited
        allowedNamespaces: []   # empty = all namespaces

      # Admins can do everything
      - name: admins-full-access
        groups:
          - admins@company.com
        allowedResources:
          - "*"
        maxResourcesPerUser: 0
        allowedNamespaces: []
---
# Secret for Google Workspace service account
# In production, use External Secrets or sealed-secrets
apiVersion: v1
kind: Secret
metadata:
  name: google-workspace-sa
  namespace: platform-system
type: Opaque
stringData:
  key.json: |
    {
      "type": "service_account",
      "project_id": "your-project-id",
      "private_key_id": "...",
      "private_key": "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n",
      "client_email": "workspace-sync@your-project-id.iam.gserviceaccount.com",
      "client_id": "...",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
---
# Namespace for synced users
apiVersion: v1
kind: Namespace
metadata:
  name: platform-users
  labels:
    app: platform-operator
