# Multi-cloud Bucket Examples
# This abstraction maps to provider-specific Crossplane resources

---
# GCP Cloud Storage Bucket
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: Bucket
metadata:
  name: my-gcp-bucket
  namespace: default
spec:
  provider: gcp
  parameters:
    location: us-east1
    storageClass: STANDARD
    versioning: true
    publicAccessPrevention: true
    lifecycleRules:
      - id: archive-old-objects
        enabled: true
        transition:
          days: 30
          storageClass: INFREQUENT_ACCESS
      - id: delete-very-old
        enabled: true
        expiration:
          days: 365
    cors:
      - allowedOrigins: ["https://example.com"]
        allowedMethods: ["GET", "PUT"]
        allowedHeaders: ["*"]
        maxAgeSeconds: 3600
    encryption:
      encryptionType: PROVIDER_MANAGED
    tags:
      environment: production
      team: platform
  accessControl:
    iamBindings:
      - role: objectViewer
        members:
          - "serviceAccount:my-app@project.iam.gserviceaccount.com"
      - role: objectAdmin
        members:
          - "group:developers@example.com"
  providerConfigRef:
    name: gcp-provider
  writeConnectionSecretToRef:
    name: my-gcp-bucket-connection
    namespace: default
  deletionPolicy: Delete

---
# AWS S3 Bucket
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: Bucket
metadata:
  name: my-aws-bucket
  namespace: default
spec:
  provider: aws
  parameters:
    location: us-east-1
    storageClass: STANDARD
    versioning: true
    publicAccessPrevention: true
    lifecycleRules:
      - id: transition-to-ia
        enabled: true
        prefix: logs/
        transition:
          days: 30
          storageClass: INFREQUENT_ACCESS
      - id: transition-to-glacier
        enabled: true
        prefix: archives/
        transition:
          days: 90
          storageClass: ARCHIVE
      - id: cleanup-old-versions
        enabled: true
        noncurrentVersionExpiration: 30
    encryption:
      encryptionType: PROVIDER_MANAGED
    cors:
      - allowedOrigins: ["*"]
        allowedMethods: ["GET"]
        allowedHeaders: ["Authorization"]
        exposeHeaders: ["ETag"]
        maxAgeSeconds: 3000
    logging:
      targetBucket: my-logs-bucket
      targetPrefix: s3-access-logs/
    tags:
      Environment: production
      CostCenter: platform
  accessControl:
    iamBindings:
      - role: objectViewer
        members:
          - "arn:aws:iam::123456789012:role/MyAppRole"
      - role: objectAdmin
        members:
          - "arn:aws:iam::123456789012:user/admin"
  providerConfigRef:
    name: aws-provider
  writeConnectionSecretToRef:
    name: my-aws-bucket-connection
  deletionPolicy: Delete

---
# Azure Blob Storage
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: Bucket
metadata:
  name: my-azure-bucket
  namespace: default
spec:
  provider: azure
  parameters:
    location: eastus
    storageClass: STANDARD  # Maps to "Hot" tier
    versioning: true
    publicAccessPrevention: true
    tags:
      environment: production
      department: engineering
  accessControl:
    iamBindings:
      - role: objectViewer
        members:
          - "00000000-0000-0000-0000-000000000001"  # Azure AD Principal ID
      - role: objectAdmin
        members:
          - "00000000-0000-0000-0000-000000000002"
  providerConfigRef:
    name: azure-provider
  writeConnectionSecretToRef:
    name: my-azure-bucket-connection
  deletionPolicy: Delete

---
# Static Website Hosting Example (GCP)
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: Bucket
metadata:
  name: my-static-website
  namespace: default
spec:
  provider: gcp
  parameters:
    location: US
    storageClass: STANDARD
    versioning: false
    publicAccessPrevention: false  # Required for public website
    website:
      indexDocument: index.html
      errorDocument: 404.html
    cors:
      - allowedOrigins: ["*"]
        allowedMethods: ["GET", "HEAD"]
        maxAgeSeconds: 3600
    tags:
      purpose: website
  accessControl:
    acl: publicRead
  providerConfigRef:
    name: gcp-provider

---
# Data Lake Bucket with Replication (AWS)
apiVersion: platform.yurikrupnik.com/v1alpha1
kind: Bucket
metadata:
  name: data-lake-primary
  namespace: default
spec:
  provider: aws
  parameters:
    location: us-west-2
    storageClass: INTELLIGENT
    versioning: true
    publicAccessPrevention: true
    lifecycleRules:
      - id: intelligent-tiering
        enabled: true
        prefix: raw/
        transition:
          days: 0
          storageClass: INTELLIGENT
      - id: archive-processed
        enabled: true
        prefix: processed/
        transition:
          days: 90
          storageClass: ARCHIVE
    replication:
      destinationBucket: data-lake-replica
      destinationRegion: eu-west-1
      prefix: critical/
    encryption:
      encryptionType: CUSTOMER_MANAGED
      kmsKeyId: arn:aws:kms:us-west-2:123456789012:key/my-key-id
    notifications:
      - id: new-data-notification
        events:
          - OBJECT_CREATED
        destination:
          destinationType: topic
          target: arn:aws:sns:us-west-2:123456789012:data-notifications
        prefix: incoming/
    tags:
      DataClassification: sensitive
      Compliance: gdpr
  providerConfigRef:
    name: aws-provider
  deletionPolicy: Orphan  # Keep bucket on CR deletion
