---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-operator
  namespace: platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-operator
rules:
  # CRD access
  - apiGroups: ["platform.yurikrupnik.com"]
    resources: ["platformapps", "gitopsapps", "crossplaneresources", "externalsecretconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.yurikrupnik.com"]
    resources: ["platformapps/status", "gitopsapps/status", "crossplaneresources/status", "externalsecretconfigs/status"]
    verbs: ["get", "update", "patch"]
  # Core resources for managing workloads
  - apiGroups: [""]
    resources: ["namespaces", "configmaps", "secrets", "services", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # FluxCD resources for GitOpsApp
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "helmrepositories"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Crossplane resources
  - apiGroups: ["apiextensions.crossplane.io"]
    resources: ["compositions", "compositeresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # External Secrets Operator resources
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets", "clustersecretstores", "secretstores", "clusterexternalsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-operator
subjects:
  - kind: ServiceAccount
    name: platform-operator
    namespace: platform-system
roleRef:
  kind: ClusterRole
  name: platform-operator
  apiGroup: rbac.authorization.k8s.io
