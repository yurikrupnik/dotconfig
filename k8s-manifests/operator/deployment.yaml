---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-system
  labels:
    app.kubernetes.io/name: platform-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-operator
  namespace: platform-system
  labels:
    app.kubernetes.io/name: platform-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: platform-operator
      containers:
        - name: operator
          image: yurikrupnik/platform-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: "info,platform_operator=debug"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
